<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nemo â€” Schedule</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/jpeg" href="tan.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400&display=swap');

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface2: #121212;
            --border: rgba(0, 200, 255, 0.15);
            --accent: #00c8ff;
            --accent2: #0066ff;
            --accent3: #00ffaa;
            --warn: #ffaa00;
            --danger: #ff3366;
            --text: #ffffff;
            --text-dim: #a0b0c0;
            --font-hud: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Exo 2', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 200, 255, 0.012) 2px, rgba(0, 200, 255, 0.012) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        #app {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        /* TOP BAR */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px 8px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(2, 4, 8, 0.95);
            backdrop-filter: blur(8px);
        }

        .page-title {
            font-family: var(--font-hud);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.4);
        }

        .page-sub {
            font-family: var(--font-mono);
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        #menu-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
        }

        /* NAV MENU */
        #nav-menu {
            position: fixed;
            top: 52px;
            right: 14px;
            background: #080f18;
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
            min-width: 190px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            display: none;
        }

        #nav-menu.open {
            display: block;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            font-family: var(--font-hud);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 200, 255, 0.06);
            text-decoration: none;
            transition: all 0.15s;
        }

        .nav-item:last-child {
            border-bottom: none;
        }

        .nav-item:hover {
            background: rgba(0, 200, 255, 0.07);
            color: var(--accent);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(0, 200, 255, 0.06);
        }

        /* CONTENT */
        #content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        /* DATE HEADER */
        .date-header {
            text-align: center;
            padding: 14px 0 8px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .date-sub {
            font-size: 9px;
            color: var(--text-dim);
            margin-top: 3px;
            letter-spacing: 1.5px;
        }

        /* TAB BAR */
        #tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 9px 4px;
            border-radius: 7px;
            font-family: var(--font-hud);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-align: center;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.2s;
            border: none;
            background: none;
            text-transform: uppercase;
        }

        .tab.active {
            background: rgba(0, 200, 255, 0.14);
            color: var(--accent);
            border: 1px solid rgba(0, 200, 255, 0.25);
        }

        /* ADD FORM */
        .add-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-title {
            font-family: var(--font-hud);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .field-label {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .field-input {
            width: 100%;
            background: rgba(0, 200, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 13px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field-input:focus {
            border-color: rgba(0, 200, 255, 0.35);
        }

        .field-input::placeholder {
            color: var(--text-dim);
        }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .add-btn {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.18), rgba(0, 200, 255, 0.08));
            border: 1px solid rgba(0, 200, 255, 0.4);
            border-radius: 10px;
            padding: 12px;
            color: var(--accent);
            font-family: var(--font-hud);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .add-btn:active {
            transform: scale(0.97);
        }

        /* TIMELINE */
        #event-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .event-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            animation: card-in 0.2s ease-out;
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .event-time-col {
            width: 60px;
            flex-shrink: 0;
            padding: 12px 8px;
            background: rgba(0, 200, 255, 0.05);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .event-time-val {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent);
            line-height: 1.2;
        }

        .event-time-label {
            font-family: var(--font-mono);
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .event-body {
            flex: 1;
            padding: 12px 14px;
            min-width: 0;
        }

        .event-title {
            font-family: var(--font-hud);
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-meta {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .event-note {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            line-height: 1.4;
        }

        .event-del {
            flex-shrink: 0;
            padding: 0 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: rgba(255, 51, 102, 0.4);
            font-size: 15px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .event-del:hover {
            color: var(--danger);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            line-height: 2;
        }

        .empty-icon {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* TODAY DOT */
        .today-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent3);
            box-shadow: 0 0 8px var(--accent3);
            margin-right: 5px;
            vertical-align: middle;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 255, 170, 0.12);
            border: 1px solid rgba(0, 255, 170, 0.3);
            border-radius: 8px;
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--accent3);
            letter-spacing: 1.5px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
        }

        .stat-num {
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
        }

        .stat-lbl {
            font-family: var(--font-mono);
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div id="app">

        <div id="topbar">
            <div>
                <div class="page-title">SCHEDULE</div>
                <div class="page-sub">EVENT TIMELINE</div>
            </div>
            <button id="menu-btn" onclick="toggleMenu()">â˜°</button>
        </div>

        <div id="nav-menu">
            <a class="nav-item" href="index.html"><span>ðŸ¤–</span>AI CHAT</a>
            <a class="nav-item" href="data.html"><span>ðŸ§ </span>KNOWLEDGE</a>
            <a class="nav-item active" href="schedule.html"><span>ðŸ“…</span>SCHEDULE</a>
            <a class="nav-item" href="tasks.html"><span>âœ…</span>TASKS</a>
            <a class="nav-item" href="history.html"><span>ðŸ“œ</span>HISTORY</a>
        </div>

        <div id="content">

            <!-- DATE DISPLAY -->
            <div class="date-header">
                <div id="date-display"></div>
                <div class="date-sub" id="time-display"></div>
            </div>

            <!-- STATS -->
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-num" id="stat-today">0</div>
                    <div class="stat-lbl">TODAY</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-tomorrow">0</div>
                    <div class="stat-lbl">TOMORROW</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-total">0</div>
                    <div class="stat-lbl">TOTAL</div>
                </div>
            </div>

            <!-- TABS -->
            <div id="tabs">
                <button class="tab active" onclick="switchTab('today')">TODAY</button>
                <button class="tab" onclick="switchTab('tomorrow')">TOMORROW</button>
                <button class="tab" onclick="switchTab('upcoming')">UPCOMING</button>
                <button class="tab" onclick="switchTab('all')">ALL</button>
            </div>

            <!-- ADD FORM -->
            <div class="add-form">
                <div class="form-title">+ ADD EVENT</div>
                <div>
                    <div class="field-label">Event Title</div>
                    <input type="text" class="field-input" id="f-title" placeholder="Meeting, Call, Reminderâ€¦" />
                </div>
                <div class="grid2">
                    <div>
                        <div class="field-label">Date</div>
                        <input type="date" class="field-input" id="f-date" />
                    </div>
                    <div>
                        <div class="field-label">Time</div>
                        <input type="time" class="field-input" id="f-time" />
                    </div>
                </div>
                <div>
                    <div class="field-label">Note (optional)</div>
                    <input type="text" class="field-input" id="f-note" placeholder="Additional detailsâ€¦" />
                </div>
                <button class="add-btn" onclick="addEvent()">ðŸ“… ADD TO SCHEDULE</button>
            </div>

            <!-- EVENT LIST -->
            <div id="event-list"></div>

        </div>
    </div>

    <div id="toast"></div>

    <script>
        const LS = {
            get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW Registered');
                }).catch(err => console.log('SW Reg Failed', err));
            });
        }

        let menuOpen = false;
        let currentTab = 'today';

        function toggleMenu() {
            menuOpen = !menuOpen;
            document.getElementById('nav-menu').classList.toggle('open', menuOpen);
        }
        document.addEventListener('click', e => {
            if (menuOpen && !e.target.closest('#nav-menu') && !e.target.closest('#menu-btn')) {
                menuOpen = false; document.getElementById('nav-menu').classList.remove('open');
            }
        });

        // Set default date to today
        function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('f-date').value = today;
            updateClock();
            setInterval(updateClock, 1000);
            updateStats();
            renderEvents('today');
        }

        function updateClock() {
            const now = new Date();
            const days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            document.getElementById('date-display').innerHTML =
                `<span class="today-dot"></span>${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time-display').textContent = `${h}:${m}:${s}`;
        }

        function updateStats() {
            const schedule = LS.get('Nemo_schedule') || [];
            const today = new Date().toDateString();
            const tomorrow = new Date(Date.now() + 86400000).toDateString();
            document.getElementById('stat-today').textContent = schedule.filter(e => new Date(e.date).toDateString() === today).length;
            document.getElementById('stat-tomorrow').textContent = schedule.filter(e => new Date(e.date).toDateString() === tomorrow).length;
            document.getElementById('stat-total').textContent = schedule.length;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', ['today', 'tomorrow', 'upcoming', 'all'][i] === tab);
            });
            renderEvents(tab);
        }

        function renderEvents(tab) {
            const schedule = LS.get('Nemo_schedule') || [];
            const list = document.getElementById('event-list');
            const now = new Date();
            const today = now.toDateString();
            const tomorrow = new Date(Date.now() + 86400000).toDateString();

            let filtered = [];
            if (tab === 'today') filtered = schedule.filter(e => new Date(e.date).toDateString() === today);
            else if (tab === 'tomorrow') filtered = schedule.filter(e => new Date(e.date).toDateString() === tomorrow);
            else if (tab === 'upcoming') filtered = schedule.filter(e => new Date(e.date) >= now).sort((a, b) => new Date(a.date) - new Date(b.date));
            else filtered = [...schedule].sort((a, b) => new Date(b.date) - new Date(a.date));

            if (!filtered.length) {
                list.innerHTML = `<div class="empty-state"><div class="empty-icon">ðŸ“…</div>NO EVENTS<br>${tab.toUpperCase()}</div>`;
                return;
            }

            list.innerHTML = filtered.map(e => {
                const d = new Date(e.date);
                const dateStr = d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
                const timeVal = e.time || '--:--';
                return `
        <div class="event-card" id="ev-${e.id}">
          <div class="event-time-col">
            <div class="event-time-val">${timeVal}</div>
            <div class="event-time-label">${dateStr}</div>
          </div>
          <div class="event-body">
            <div class="event-title">${escHtml(e.title)}</div>
            ${e.note ? `<div class="event-note">${escHtml(e.note)}</div>` : ''}
          </div>
          <button class="event-del" onclick="deleteEvent(${e.id})">âœ•</button>
        </div>`;
            }).join('');
        }

        function addEvent() {
            const title = document.getElementById('f-title').value.trim();
            const date = document.getElementById('f-date').value;
            const time = document.getElementById('f-time').value;
            const note = document.getElementById('f-note').value.trim();
            if (!title) { showToast('ENTER EVENT TITLE'); return; }
            if (!date) { showToast('SELECT DATE'); return; }

            const schedule = LS.get('Nemo_schedule') || [];
            schedule.push({ id: Date.now(), title, date, time, note, created: new Date().toISOString() });
            LS.set('Nemo_schedule', schedule);

            document.getElementById('f-title').value = '';
            document.getElementById('f-time').value = '';
            document.getElementById('f-note').value = '';

            updateStats();
            renderEvents(currentTab);
            showToast('EVENT ADDED');
        }

        function deleteEvent(id) {
            let schedule = LS.get('Nemo_schedule') || [];
            schedule = schedule.filter(e => e.id !== id);
            LS.set('Nemo_schedule', schedule);
            updateStats();
            renderEvents(currentTab);
            showToast('EVENT DELETED');
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }

        init();
    </script>
</body>

</html>
