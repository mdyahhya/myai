<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tan — Tasks</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/jpeg" href="tanai.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400&display=swap');

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface2: #121212;
            --border: rgba(0, 200, 255, 0.15);
            --accent: #00c8ff;
            --accent2: #0066ff;
            --accent3: #00ffaa;
            --text: #ffffff;
            --text-dim: #a0b0c0;
            --danger: #ff3366;
            --warn: #ffaa00;
            --font-hud: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Exo 2', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 200, 255, 0.012) 2px, rgba(0, 200, 255, 0.012) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        #app {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px 8px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
        }

        .page-title {
            font-family: var(--font-hud);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.4);
        }

        .page-sub {
            font-family: var(--font-mono);
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        #menu-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
        }

        #nav-menu {
            position: fixed;
            top: 52px;
            right: 14px;
            background: #080f18;
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
            min-width: 190px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            display: none;
        }

        #nav-menu.open { display: block; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            font-family: var(--font-hud);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 200, 255, 0.06);
            text-decoration: none;
        }

        .nav-item:hover { background: rgba(0, 200, 255, 0.07); color: var(--accent); }
        .nav-item.active { color: var(--accent); background: rgba(0, 200, 255, 0.06); }

        #content { flex: 1; padding: 16px; overflow-y: auto; }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .stat-num {
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--accent);
        }

        .stat-lbl {
            font-family: var(--font-mono);
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        .add-task-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #task-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-family: var(--font-body);
            outline: none;
        }

        .add-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-family: var(--font-hud);
            font-weight: 700;
            cursor: pointer;
        }

        .task-list { display: flex; flex-direction: column; gap: 8px; }

        .task-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .task-check {
            width: 20px;
            height: 20px;
            border: 1px solid var(--accent);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 14px;
        }

        .task-item.done { opacity: 0.5; }
        .task-item.done .task-text { text-decoration: line-through; color: var(--text-dim); }

        .task-text { flex: 1; font-size: 14px; }

        .task-del { color: var(--danger); cursor: pointer; opacity: 0.5; }
        .task-del:hover { opacity: 1; }

        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(0, 255, 170, 0.12); border: 1px solid rgba(0, 255, 170, 0.3);
            border-radius: 8px; padding: 10px 20px; font-family: var(--font-mono); font-size: 11px;
            color: var(--accent3); opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none;
        }

        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>

<body>
<div id="app">
    <div id="topbar">
        <div>
            <div class="page-title">TASKS</div>
            <div class="page-sub">OBJECTIVE TRACKER</div>
        </div>
        <button id="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div id="nav-menu">
        <a class="nav-item" href="index.html"><span>🤖</span>AI CHAT</a>
        <a class="nav-item" href="data.html"><span>🧠</span>KNOWLEDGE</a>
        <a class="nav-item" href="schedule.html"><span>📅</span>SCHEDULE</a>
        <a class="nav-item active" href="tasks.html"><span>✅</span>TASKS</a>
        <a class="nav-item" href="history.html"><span>📜</span>HISTORY</a>
    </div>

    <div id="content">
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-num" id="stat-pending">0</div>
                <div class="stat-lbl">PENDING</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-done">0</div>
                <div class="stat-lbl">COMPLETED</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-total">0</div>
                <div class="stat-lbl">TOTAL</div>
            </div>
        </div>

        <div class="add-task-wrap">
            <input type="text" id="task-input" placeholder="New objective…" onkeydown="if(event.key==='Enter')addTask()">
            <button class="add-btn" onclick="addTask()">ADD OBJECTIVE</button>
        </div>

        <div class="task-list" id="task-list"></div>
    </div>
</div>

<div id="toast"></div>

<script>
    const LS = {
        get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
        set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
    };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Reg Failed', err));
        });
    }

    let menuOpen = false;
    function toggleMenu() {
        menuOpen = !menuOpen;
        document.getElementById('nav-menu').classList.toggle('open', menuOpen);
    }

    function loadTasks() {
        const tasks = LS.get('tan_tasks') || [];
        const pending = tasks.filter(t => !t.done);
        const done = tasks.filter(t => t.done);
        
        document.getElementById('stat-pending').textContent = pending.length;
        document.getElementById('stat-done').textContent = done.length;
        document.getElementById('stat-total').textContent = tasks.length;

        const list = document.getElementById('task-list');
        list.innerHTML = tasks.sort((a,b) => a.done - b.done || b.id - a.id).map(t => `
            <div class="task-item ${t.done ? 'done' : ''}">
                <div class="task-check" onclick="toggleTask(${t.id})">${t.done ? '✓' : ''}</div>
                <div class="task-text">${t.text}</div>
                <div class="task-del" onclick="deleteTask(${t.id})">✕</div>
            </div>
        `).join('');
    }

    function addTask() {
        const input = document.getElementById('task-input');
        const text = input.value.trim();
        if (!text) return;

        const tasks = LS.get('tan_tasks') || [];
        tasks.push({ id: Date.now(), text, done: false });
        LS.set('tan_tasks', tasks);
        input.value = '';
        loadTasks();
        showToast('TASK ADDED');
    }

    function toggleTask(id) {
        const tasks = LS.get('tan_tasks') || [];
        const task = tasks.find(t => t.id === id);
        if (task) task.done = !task.done;
        LS.set('tan_tasks', tasks);
        loadTasks();
    }

    function deleteTask(id) {
        let tasks = LS.get('tan_tasks') || [];
        tasks = tasks.filter(t => t.id !== id);
        LS.set('tan_tasks', tasks);
        loadTasks();
        showToast('TASK DELETED');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    loadTasks();
</script>
</body>
</html>
