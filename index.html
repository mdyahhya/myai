<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nemo AI — Silent Assistant</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/jpeg" href="tan.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400&display=swap');

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface2: #121212;
            --border: rgba(0, 200, 255, 0.15);
            --accent: #00c8ff;
            --accent2: #0066ff;
            --accent3: #00ffaa;
            --text: #ffffff;
            --text-dim: #a0b0c0;
            --danger: #ff3366;
            --warn: #ffaa00;
            --glow: 0 0 20px rgba(0, 200, 255, 0.3);
            --font-hud: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Exo 2', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); }
        body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 200, 255, 0.005) 2px, rgba(0, 200, 255, 0.005) 4px); pointer-events: none; z-index: 9999; }

        #app { display: flex; flex-direction: column; width: 100%; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; background: #000; overflow: hidden; position: relative; }

        /* ── AUTH ── */
        #auth-overlay { position: absolute; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #auth-overlay.hidden { display: none; }
        .auth-logo { font-family: var(--font-hud); font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: 8px; margin-bottom: 30px; text-shadow: var(--glow); text-align: center; }
        .auth-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: #fff; text-align: center; font-family: var(--font-mono); outline: none; margin-bottom: 12px; }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 14px; font-family: var(--font-hud); font-weight: 700; cursor: pointer; }

        /* ── TOP BAR ── */
        #topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); z-index: 50; flex-shrink: 0; }
        .logo-text { font-family: var(--font-hud); font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 3px; }
        #menu-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text-dim); cursor: pointer; }

        /* ── NAVIGATION MENU ── */
        #nav-menu { position: absolute; top: 60px; right: 16px; background: #080f18; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; z-index: 100; min-width: 180px; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #nav-menu.open { display: block; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; color: var(--text-dim); text-decoration: none; font-family: var(--font-hud); font-size: 14px; border-bottom: 1px solid rgba(0,200,255,0.05); }
        .nav-item:hover { background: rgba(0,200,255,0.05); color: var(--accent); }
        .nav-item.active { color: var(--accent); background: rgba(0,200,255,0.08); }

        /* ── DASHBOARD HEADER ── */
        #dash-header { padding: 10px 16px; flex-shrink: 0; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px; text-align: center; }
        .stat-num { font-family: var(--font-mono); font-size: 18px; color: var(--accent); }
        .stat-lbl { font-family: var(--font-mono); font-size: 7px; color: var(--text-dim); letter-spacing: 1.5px; margin-top: 2px; }

        /* ── AVATAR ── */
        #avatar-area { height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .orbit-container { width: 120px; height: 120px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .orbit-ring { position: absolute; border: 1px solid rgba(0, 200, 255, 0.1); border-radius: 50%; animation: rotate 12s linear infinite; }
        .orbit-ring:nth-child(1) { width: 100%; height: 100%; }
        .orbit-ring:nth-child(2) { width: 130%; height: 130%; animation-direction: reverse; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .avatar-core { width: 85px; height: 85px; background: #000; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0, 200, 255, 0.3); z-index: 20; }
        #nemo-video { width: 140%; height: 140%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; pointer-events: none; }
        #state-label { font-family: var(--font-mono); font-size: 9px; margin-top: 10px; color: var(--text-dim); letter-spacing: 2px; }

        /* ── QUICK CHIPS ── */
        #quick-chips { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 12px; scrollbar-width: none; flex-shrink: 0; }
        #quick-chips::-webkit-scrollbar { display: none; }
        .chip { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 6px 14px; font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); cursor: pointer; }

        /* ── CHAT ── */
        #chat-thread { flex: 1; overflow-y: auto; padding: 0 16px 10px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease-out; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; background: var(--accent2); color: #fff; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); color: #fff; border-bottom-left-radius: 4px; }
        .msg.ai::before { content: 'NEMO'; position: absolute; top: -14px; left: 4px; font-family: var(--font-mono); font-size: 7px; color: var(--accent); letter-spacing: 1px; }

        /* ── INPUT ── */
        #input-area { padding: 12px 16px; background: rgba(0,0,0,0.96); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; padding-bottom: env(safe-area-inset-bottom, 12px); flex-shrink: 0; }
        #text-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; padding: 10px 18px; color: #fff; outline: none; font-size: 14px; }
        #mic-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        #mic-btn.active { background: var(--accent3); color: #000; box-shadow: 0 0 15px var(--accent3); }

        /* ── MISC ── */
        #lang-overlay { position: absolute; top: 12px; right: 55px; z-index: 60; }
        #lang-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-family: var(--font-mono); font-size: 9px; color: var(--accent); cursor: pointer; }
        #toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(0, 255, 170, 0.2); border: 1px solid var(--accent3); border-radius: 8px; padding: 8px 16px; font-family: var(--font-mono); font-size: 11px; color: var(--accent3); opacity: 0; transition: opacity 0.3s; z-index: 500; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>

<body>
<div id="app">
    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">NEMO AI</div>
            <input type="password" id="pass-input" class="auth-input" placeholder="ACCESS KEY">
            <button class="auth-btn" onclick="checkAuth()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="topbar">
        <div class="logo-text">NEMO AI</div>
        <button id="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div id="nav-menu">
        <a class="nav-item active" href="index.html">🤖 AI CHAT</a>
        <a class="nav-item" href="data.html">🧠 KNOWLEDGE</a>
        <a class="nav-item" href="schedule.html">📅 SCHEDULE</a>
        <a class="nav-item" href="tasks.html">✅ TASKS</a>
        <a class="nav-item" href="history.html">📜 HISTORY</a>
    </div>

    <div id="dash-header">
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-num" id="stat-pending">0</div>
                <div class="stat-lbl">PENDING</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-today">0</div>
                <div class="stat-lbl">TODAY</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-total">0</div>
                <div class="stat-lbl">OBJECTIVES</div>
            </div>
        </div>
    </div>

    <div id="lang-overlay">
        <div id="lang-badge" onclick="toggleLang()">LANG: EN</div>
    </div>

    <div id="avatar-area">
        <div class="orbit-container" onclick="toggleMic()">
            <div class="orbit-ring"></div>
            <div class="orbit-ring"></div>
            <div class="avatar-core">
                <video id="nemo-video" src="aitan.mp4" autoplay loop muted playsinline aria-hidden="true"></video>
            </div>
        </div>
        <div id="state-label">IDLE</div>
    </div>

    <div id="quick-chips">
        <div class="chip" onclick="sendMessage('What is my schedule for today?')">📅 TODAY SCHEDULE</div>
        <div class="chip" onclick="sendMessage('What are my tasks for tomorrow?')">✅ TOMORROW TASKS</div>
        <div class="chip" onclick="sendMessage('How many total objectives do I have?')">📊 STATS PULSE</div>
        <div class="chip" onclick="window.location.href='tasks.html'">➕ NEW TASK</div>
    </div>

    <div id="chat-thread"></div>

    <div id="input-area">
        <input type="text" id="text-input" placeholder="Talk to Nemo AI..." onkeydown="if(event.key==='Enter')sendMessage()">
        <div id="mic-btn" onclick="toggleMic()">🎤</div>
    </div>
</div>

<div id="toast"></div>

<script>
    const LS = {
        get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
        set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
    };

    let mediaRecorder, chunks = [], isListening = false, pwaListening = false, currentLang = 'en-US', menuOpen = false;

    function toggleMenu() {
        menuOpen = !menuOpen;
        document.getElementById('nav-menu').classList.toggle('open', menuOpen);
    }

    function toggleLang() {
        currentLang = currentLang === 'en-US' ? 'hi-IN' : 'en-US';
        document.getElementById('lang-badge').textContent = currentLang === 'en-US' ? 'LANG: EN' : 'LANG: HI';
        showToast('LANGUAGE SET TO ' + (currentLang === 'en-US' ? 'ENGLISH' : 'HINDI'));
    }

    // ── NEW SILENT WHISPER SYSTEM ──
    async function startSilentRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            
            mediaRecorder.onstop = async () => {
                if (chunks.length === 0) return;
                const blob = new Blob(chunks, { type: 'audio/webm' });
                await sendToWhisper(blob);
                if (pwaListening) startSilentRecording(); // Continuous
            };

            mediaRecorder.start();
            isListening = true;
            document.getElementById('state-label').textContent = 'SILENTLY LISTENING...';
            document.getElementById('mic-btn').classList.add('active');

            // Collect 4 seconds of audio at a time for live feel
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            }, 4000);

        } catch (err) {
            console.error('Silent Mic Access Denied', err);
            isListening = false;
            pwaListening = false;
        }
    }

    async function sendToWhisper(blob) {
        if (!pwaListening) return;
        try {
            document.getElementById('state-label').textContent = 'PROCESSING...';
            const res = await fetch('/.netlify/functions/whisper', {
                method: 'POST',
                body: blob
            });
            const data = await res.json();
            const text = data.text?.trim();
            
            if (text && text.length > 1) {
                document.getElementById('text-input').value = text;
                if (text.toLowerCase().includes('bye') || text.toLowerCase().includes('goodbye')) {
                    pwaListening = false;
                    speak("Goodbye!");
                    return;
                }
                sendMessage(text);
            } else {
                document.getElementById('state-label').textContent = 'SILENTLY LISTENING...';
            }
        } catch (e) {
            console.error('Whisper Error', e);
        }
    }

    async function sendMessage(text) {
        const input = document.getElementById('text-input');
        const msg = text || input.value.trim();
        if (!msg) return;
        
        input.value = '';
        addMessage('user', msg);
        
        const tasks = LS.get('nemo_tasks') || [];
        const schedule = LS.get('nemo_schedule') || [];
        const history = LS.get('nemo_chat_history') || [];
        
        const context = `Context: Tasks:${JSON.stringify(tasks.slice(0,5))}, Schedule:${JSON.stringify(schedule.slice(0,5))}, Date:${new Date().toDateString()}`;
        
        history.push({ role: 'user', content: msg });
        
        try {
            document.getElementById('state-label').textContent = 'THINKING...';
            const res = await fetch('/.netlify/functions/groq', {
                method: 'POST',
                body: JSON.stringify({ messages: [{ role: 'system', content: context }, ...history.slice(-6)] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            addMessage('ai', reply);
            history.push({ role: 'assistant', content: reply });
            LS.set('nemo_chat_history', history.slice(-20));
            speak(reply);
        } catch (e) {
            addMessage('ai', 'Connection issue.');
        } finally {
            if (!pwaListening) document.getElementById('state-label').textContent = 'IDLE';
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ''));
        const voices = window.speechSynthesis.getVoices();
        utter.voice = voices.find(v => (v.name.includes('Male') || v.name.includes('David')) && v.lang.startsWith('en')) || voices[0];
        utter.lang = currentLang;
        utter.onstart = () => { document.getElementById('state-label').textContent = 'SPEAKING...'; };
        utter.onend = () => {
            if (pwaListening) {
                document.getElementById('state-label').textContent = 'SILENTLY LISTENING...';
                startSilentRecording();
            } else {
                document.getElementById('state-label').textContent = 'IDLE';
            }
        };
        window.speechSynthesis.speak(utter);
    }

    function toggleMic() {
        if (pwaListening) {
            pwaListening = false;
            isListening = false;
            if (mediaRecorder) mediaRecorder.stop();
            document.getElementById('mic-btn').classList.remove('active');
            document.getElementById('state-label').textContent = 'IDLE';
        } else {
            pwaListening = true;
            startSilentRecording();
        }
    }

    function addMessage(role, text) {
        const div = document.createElement('div'); div.className = 'msg ' + role; div.textContent = text;
        const box = document.getElementById('chat-thread'); box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    async function checkAuth() {
        const pass = document.getElementById('pass-input').value;
        const res = await fetch('/.netlify/functions/verify', { method: 'POST', body: JSON.stringify({ password: pass }) });
        const data = await res.json();
        if (data.authorized) {
            localStorage.setItem('nemo_auth', 'true');
            document.getElementById('auth-overlay').classList.add('hidden');
        } else alert('Access Denied');
    }

    function updateStats() {
        const tasks = LS.get('nemo_tasks') || [];
        const sc = LS.get('nemo_schedule') || [];
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('stat-total').textContent = tasks.length;
        document.getElementById('stat-pending').textContent = tasks.filter(t => !t.done).length;
        document.getElementById('stat-today').textContent = sc.filter(s => s.date === today).length;
    }

    function showToast(m) {
        const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    window.onload = () => {
        if (localStorage.getItem('nemo_auth') === 'true') document.getElementById('auth-overlay').classList.add('hidden');
        updateStats();
        // Double Tap to Wake
        document.addEventListener('dblclick', () => { if (!pwaListening) toggleMic(); showToast('NEMO SILENTLY AWAKE'); });
    };
</script>
</body>
</html>
