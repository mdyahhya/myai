<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nemo — AI Mobile Assistant</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/jpeg" href="tan.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400&display=swap');

        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface2: #121212;
            --border: rgba(0, 200, 255, 0.15);
            --accent: #00c8ff;
            --accent2: #0066ff;
            --accent3: #00ffaa;
            --text: #ffffff;
            --text-dim: #a0b0c0;
            --danger: #ff3366;
            --warn: #ffaa00;
            --glow: 0 0 20px rgba(0, 200, 255, 0.3);
            --font-hud: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Exo 2', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 200, 255, 0.01) 2px, rgba(0, 200, 255, 0.01) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        /* ── AUTH ── */
        #auth-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #auth-overlay.hidden { display: none; }

        .auth-card {
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        .auth-logo {
            font-family: var(--font-hud);
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: var(--glow);
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            color: #fff;
            text-align: center;
            font-family: var(--font-mono);
            outline: none;
            margin-bottom: 12px;
        }

        .auth-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-family: var(--font-hud);
            font-weight: 700;
            cursor: pointer;
        }

        /* ── TOP BAR ── */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            z-index: 50;
        }

        .logo-text {
            font-family: var(--font-hud);
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
        }

        #lang-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--accent);
            cursor: pointer;
        }

        /* ── AVATAR AREA ── */
        #avatar-area {
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at center, rgba(0, 200, 255, 0.05) 0%, transparent 70%);
        }

        .orbit-container {
            width: 140px;
            height: 140px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit-ring {
            position: absolute;
            border: 1px solid rgba(0, 200, 255, 0.15);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        .orbit-ring:nth-child(1) { width: 100%; height: 100%; }
        .orbit-ring:nth-child(2) { width: 120%; height: 120%; animation-direction: reverse; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .avatar-core {
            width: 100px;
            height: 100px;
            background: #000;
            border-radius: 50%;
            border: 2px solid var(--accent);
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.4);
            z-index: 20;
            cursor: pointer;
        }

        #nemo-video {
            width: 140%;
            height: 140%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            pointer-events: none;
        }

        #state-label {
            font-family: var(--font-mono);
            font-size: 10px;
            margin-top: 15px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .active-listening #state-label { color: var(--accent3); text-shadow: 0 0 8px var(--accent3); }

        /* ── MESSAGES ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeUp 0.3s ease-out;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user {
            align-self: flex-end;
            background: var(--accent2);
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .msg.ai {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            border-bottom-left-radius: 2px;
        }

        /* ── INPUT AREA ── */
        #input-area {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }

        #text-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        #mic-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #mic-btn.active {
            background: var(--accent3);
            color: #000;
            box-shadow: 0 0 15px var(--accent3);
        }

        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 255, 170, 0.2); border: 1px solid var(--accent3);
            border-radius: 8px; padding: 8px 16px; font-family: var(--font-mono); font-size: 11px;
            color: var(--accent3); opacity: 0; transition: opacity 0.3s; z-index: 500;
        }
        #toast.show { opacity: 1; }
    </style>
</head>

<body>
<div id="app">
    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">NEMO</div>
            <input type="password" id="pass-input" class="auth-input" placeholder="ACCESS KEY" onkeydown="if(event.key==='Enter')checkAuth()">
            <button class="auth-btn" onclick="checkAuth()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="topbar">
        <div class="logo-text">NEMO AI</div>
        <div id="lang-toggle" onclick="toggleLang()">EN | HI</div>
    </div>

    <div id="avatar-area">
        <div class="orbit-container">
            <div class="orbit-ring"></div>
            <div class="orbit-ring"></div>
            <div class="avatar-core" onclick="toggleMic()">
                <video id="nemo-video" src="aitan.mp4" autoplay loop muted playsinline></video>
            </div>
        </div>
        <div id="state-label">IDLE</div>
    </div>

    <div id="messages"></div>

    <div id="input-area">
        <input type="text" id="text-input" placeholder="Talk to Nemo..." onkeydown="if(event.key==='Enter')sendMessage()">
        <div id="mic-btn" onclick="toggleMic()">🎤</div>
    </div>
</div>

<div id="toast"></div>

<script>
    const LS = {
        get: k => JSON.parse(localStorage.getItem(k)),
        set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
    };

    let recognition, isListening = false, pwaListening = false, currentLang = 'en-US';

    function toggleLang() {
        currentLang = currentLang === 'en-US' ? 'hi-IN' : 'en-US';
        document.getElementById('lang-toggle').textContent = currentLang === 'en-US' ? 'EN | HI' : 'HI | EN';
        if (recognition) recognition.lang = currentLang;
        showToast('LANG: ' + (currentLang === 'en-US' ? 'ENGLISH' : 'HINDI'));
    }

    function setupSpeech() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        recognition = new SR();
        recognition.lang = currentLang;
        recognition.continuous = false;
        recognition.interimResults = true;

        recognition.onstart = () => {
            isListening = true;
            document.getElementById('state-label').textContent = 'LISTENING...';
            document.body.classList.add('active-listening');
            document.getElementById('mic-btn').classList.add('active');
        };

        recognition.onend = () => {
            isListening = false;
            document.getElementById('mic-btn').classList.remove('active');
            if (pwaListening && !window.speechSynthesis.speaking) {
                setTimeout(() => { if (pwaListening) recognition.start(); }, 300);
            } else if (!pwaListening) {
                document.getElementById('state-label').textContent = 'IDLE';
                document.body.classList.remove('active-listening');
            }
        };

        recognition.onresult = e => {
            const transcript = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('text-input').value = transcript;
            
            if (e.results[e.results.length-1].isFinal) {
                if (transcript.includes('bye') || transcript.includes('bye nemo') || transcript.includes('alvida')) {
                    pwaListening = false;
                    recognition.stop();
                    speak("Goodbye! I'm here if you need me.");
                    return;
                }
                sendMessage(transcript);
            }
        };
    }

    async function sendMessage(text) {
        const input = document.getElementById('text-input');
        const msg = text || input.value.trim();
        if (!msg) return;
        
        input.value = '';
        addMessage('user', msg);
        
        const history = LS.get('nemo_chat_history') || [];
        history.push({ role: 'user', content: msg });
        
        try {
            document.getElementById('state-label').textContent = 'THINKING...';
            const res = await fetch('/.netlify/functions/groq', {
                method: 'POST',
                body: JSON.stringify({ messages: history.slice(-6) })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            addMessage('ai', reply);
            history.push({ role: 'assistant', content: reply });
            LS.set('nemo_chat_history', history.slice(-20));
            speak(reply);
        } catch (e) {
            addMessage('ai', 'Connection lost.');
        } finally {
            if (!pwaListening) document.getElementById('state-label').textContent = 'IDLE';
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ''));
        const voices = window.speechSynthesis.getVoices();
        utter.voice = voices.find(v => v.name.includes('Male') || v.name.includes('David')) || voices[0];
        utter.lang = currentLang;
        utter.onstart = () => {
            document.getElementById('state-label').textContent = 'SPEAKING...';
            if (isListening) recognition.stop();
        };
        utter.onend = () => {
            if (pwaListening) {
                setTimeout(() => { if (pwaListening) recognition.start(); }, 500);
            } else {
                document.getElementById('state-label').textContent = 'IDLE';
            }
        };
        window.speechSynthesis.speak(utter);
    }

    function toggleMic() {
        if (isListening) { pwaListening = false; recognition.stop(); }
        else { pwaListening = true; recognition.start(); }
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function checkAuth() {
        const pass = document.getElementById('pass-input').value;
        const res = await fetch('/.netlify/functions/verify', { method: 'POST', body: JSON.stringify({ password: pass }) });
        const data = await res.json();
        if (data.authorized) {
            localStorage.setItem('nemo_auth', 'true');
            document.getElementById('auth-overlay').classList.add('hidden');
            setTimeout(() => { pwaListening = true; recognition.start(); }, 1000);
        } else alert('Access Denied');
    }

    function showToast(m) {
        const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    window.onload = () => {
        if (localStorage.getItem('nemo_auth') === 'true') {
            document.getElementById('auth-overlay').classList.add('hidden');
            setTimeout(() => { pwaListening = true; recognition.start(); }, 1500);
        }
        setupSpeech();
        document.addEventListener('dblclick', () => { if (!pwaListening) { pwaListening = true; recognition.start(); showToast('NEMO AWAKE'); } });
    };
</script>
</body>
</html>
